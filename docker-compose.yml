version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shieldreport-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: shieldreport
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shieldreport-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
