services:
  # -------------------------
  # 1. Backend API (Node.js)
  # -------------------------
  - type: web
    name: shieldreport-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shieldreport-db
          property: connectionString
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: shieldreport-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # -------------------------
  # 2. Frontend (Vite Static Site)
  # -------------------------
  - type: web
    name: shieldreport-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: shieldreport-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # -------------------------
  # 3. PostgreSQL Database
  # -------------------------
  - name: shieldreport-db
    databaseName: shieldreport
    user: shieldreport_user
